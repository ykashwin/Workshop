<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance Lookup — Admins Only</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5F0EB;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:60px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .header{background:#2E1F0F;padding:28px 20px 24px;text-align:center}
  .header h1{font-family:'Playfair Display',serif;color:#F5ECD8;font-size:22px;margin-bottom:6px}
  .header p{color:#B0A090;font-size:13px}

  .wrap{max-width:520px;margin:0 auto;padding:0 16px}
  .card{background:#fff;border-radius:16px;padding:22px 20px;margin:16px 0;
        box-shadow:0 2px 12px rgba(0,0,0,0.08);border:1px solid #EDE3D8;animation:fadeUp 0.35s ease}
  .card h2{font-family:'Playfair Display',serif;font-size:17px;color:#2E1F0F;
           margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #EDE3D8}

  .field{margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:600;color:#5A4030;margin-bottom:5px}
  input{width:100%;padding:11px 13px;border:1.5px solid #D4C4B0;border-radius:9px;
    font-size:15px;font-family:'Inter',sans-serif;background:#FBF8F4;color:#2E1F0F;
    transition:border-color 0.2s;outline:none;-webkit-appearance:none}
  input:focus{border-color:#C87941;box-shadow:0 0 0 3px rgba(200,121,65,0.15)}

  .btn-p{background:linear-gradient(135deg,#C87941,#A85E28);color:#fff;border:none;
    border-radius:10px;padding:12px 18px;font-family:'Inter',sans-serif;font-weight:700;
    font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    justify-content:center;transition:opacity 0.2s;width:100%}
  .btn-p:disabled{opacity:0.6;cursor:not-allowed}
  .btn-s{background:#F0E4D4;color:#5A4030;border:none;border-radius:8px;padding:9px 16px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
  .btn-green{background:linear-gradient(135deg,#3A7D5A,#2A5A40);color:#fff;border:none;
    border-radius:9px;padding:11px 16px;font-family:'Inter',sans-serif;font-weight:700;
    font-size:14px;cursor:pointer;width:100%;margin-top:14px;display:flex;
    align-items:center;justify-content:center;gap:7px}
  .btn-green:disabled{opacity:0.5;cursor:not-allowed}
  .btn-undo{background:#F0E4D4;color:#7A4010;border:none;border-radius:8px;padding:9px 14px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;
    width:100%;margin-top:8px}

  .spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.3);
           border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}

  /* Login screen */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:#fff;border-radius:20px;padding:36px 28px;max-width:380px;width:100%;
              text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.1);border:1px solid #EDE3D8}
  .login-icon{font-size:50px;margin-bottom:14px}
  .login-card h2{font-family:'Playfair Display',serif;font-size:22px;color:#2E1F0F;margin-bottom:8px}
  .login-card p{color:#9A8878;font-size:13px;margin-bottom:22px}
  .error-msg{background:#FDE8E8;color:#B94040;border-radius:8px;padding:10px 14px;
             font-size:13px;margin-bottom:14px;display:none}

  /* Stats */
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
  .stat{background:#fff;border-radius:12px;padding:14px 8px;text-align:center;
        border:1.5px solid #EDE3D8;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
  .stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
  .stat-l{font-size:11px;color:#9A8878;font-weight:600;margin-top:2px}

  /* Profile */
  .profile-photo{width:100%;max-height:220px;object-fit:cover;border-radius:12px;
                 margin-bottom:16px;border:2px solid #D4C4B0;display:block}
  .no-photo{height:100px;background:#F0E4D4;border-radius:12px;display:flex;
            align-items:center;justify-content:center;font-size:44px;margin-bottom:16px}
  .pname{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
         color:#2E1F0F;margin-bottom:4px}
  .pcompany{font-size:14px;color:#C87941;font-weight:600;margin-bottom:14px}
  .badge{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;
         font-weight:700;margin-bottom:14px}
  .badge-yes{background:#E8F5EE;color:#2A6040;border:1.5px solid #3A7D5A44}
  .badge-no{background:#FBF0E4;color:#7A4010;border:1.5px solid #C8794144}
  .reg-tag{background:#F0E4D4;border-radius:8px;padding:5px 12px;font-size:13px;
           font-weight:700;color:#C87941;font-family:'Playfair Display',serif;
           letter-spacing:1px;display:inline-block;margin-bottom:12px}
  .drow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;
        border-bottom:1px solid #F0E8DC;font-size:14px;color:#4A3020}
  .drow:last-child{border-bottom:none}
  .dico{font-size:16px;flex-shrink:0;margin-top:1px}
  .dlbl{font-size:11px;color:#9A8878;font-weight:600;display:block;margin-bottom:2px}

  /* Mini list card */
  .mini{background:#fff;border-radius:12px;padding:13px 14px;display:flex;
        align-items:center;gap:12px;cursor:pointer;border:1.5px solid #EDE3D8;
        box-shadow:0 1px 6px rgba(0,0,0,0.06);margin-bottom:10px;transition:transform 0.15s}
  .mini:hover{transform:translateY(-2px)}
  .mini-img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0}
  .mini-av{width:46px;height:46px;border-radius:8px;background:#F0E4D4;display:flex;
           align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

  .not-found{text-align:center;padding:36px 16px}
  .not-found .ico{font-size:48px;margin-bottom:12px}
  .not-found h3{font-family:'Playfair Display',serif;font-size:19px;color:#2E1F0F;margin-bottom:8px}
  .not-found p{font-size:13px;color:#9A8878;line-height:1.6}
  .divider{text-align:center;color:#C8B8A2;font-size:12px;font-weight:600;
           margin:6px 0 14px;letter-spacing:0.5px}

  .admin-tag{background:#2E1F0F;color:#F5ECD8;font-size:11px;font-weight:700;
             padding:3px 10px;border-radius:20px;font-family:'Inter',sans-serif;
             display:inline-block;margin-left:8px;vertical-align:middle}
  .logout-btn{background:none;border:1px solid #B0A090;color:#B0A090;border-radius:6px;
              padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;
              margin-top:4px}
</style>
</head>
<body>

<script>
  // ── Configuration ─────────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDoFp1w30Z490U53u2VK_pn1raQhyPgNgu14s4vP3AzTAVCCDjbKJ9LI4MRIU5hUCsuA/exec";
  const ADMIN_EMAILS = ["ykashwin@gmail.com", "kkanth09@gmail.com"];

  // Session password (stored only in memory for this tab session)
  let sessionPassword = null;
</script>

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>Admin Access Only</h2>
    <p>This page is restricted to workshop organisers.<br/>Enter the admin password to continue.</p>
    <div class="error-msg" id="loginError">Incorrect password. Please try again.</div>
    <div class="field" style="text-align:left">
      <label>Admin Password</label>
      <input type="password" id="pwdInput" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-p" onclick="doLogin()" style="margin-top:4px">🔓 Login</button>
  </div>
</div>

<!-- ── MAIN APP (hidden until login) ── -->
<div id="mainApp" style="display:none">

  <div class="header">
    <h1>🔍 Attendance Lookup <span class="admin-tag">ADMIN</span></h1>
    <p>Search registrations · Mark attendance · View all</p>
    <button class="logout-btn" onclick="doLogout()">⬡ Logout</button>
  </div>

  <!-- Stats -->
  <div class="wrap">
    <div class="stats" id="statsBox" style="display:none">
      <div class="stat">
        <div class="stat-n" id="sTotal" style="color:#4A7CAA">—</div>
        <div class="stat-l">Registered</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="sPresent" style="color:#3A7D5A">—</div>
        <div class="stat-l">Present</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="sPending" style="color:#C87941">—</div>
        <div class="stat-l">Pending</div>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="wrap">
    <div class="card">
      <h2>🔎 Search</h2>
      <div class="field">
        <label>Registration Number</label>
        <input id="regIn" type="text" placeholder="e.g. WS260618-4821"
               oninput="clearRes()" onkeydown="if(event.key==='Enter')doSearch()"/>
      </div>
      <div class="divider">— or —</div>
      <div class="field">
        <label>Name</label>
        <input id="nameIn" type="text" placeholder="e.g. Jane Doe"
               oninput="clearRes()" onkeydown="if(event.key==='Enter')doSearch()"/>
      </div>
      <div class="divider">— or —</div>
      <div class="field">
        <label>Mobile Number</label>
        <input id="mobileIn" type="tel" placeholder="e.g. 9876543210"
               oninput="clearRes()" onkeydown="if(event.key==='Enter')doSearch()"/>
      </div>
      <button class="btn-p" id="searchBtn" onclick="doSearch()" style="margin-top:4px">
        🔍 Search
      </button>
    </div>
  </div>

  <!-- Results -->
  <div class="wrap" id="resultsWrap"></div>

  <!-- Show all -->
  <div class="wrap" style="text-align:center;margin-top:4px">
    <button class="btn-s" id="allBtn" onclick="loadAll()">📋 Show All Registrations</button>
  </div>

</div><!-- end mainApp -->

<script>
  // ── Login / logout ────────────────────────────────────────────
  function doLogin() {
    const pwd = document.getElementById("pwdInput").value;
    const err = document.getElementById("loginError");

    // Send password to backend to verify
    fetch(SCRIPT_URL + "?action=getAll&pwd=" + encodeURIComponent(pwd))
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          sessionPassword = pwd;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("mainApp").style.display = "block";
          err.style.display = "none";
          refreshStats(data.records || []);
        } else {
          err.style.display = "block";
          document.getElementById("pwdInput").value = "";
          document.getElementById("pwdInput").focus();
        }
      })
      .catch(() => {
        err.textContent = "Connection failed. Check your internet.";
        err.style.display = "block";
      });
  }

  function doLogout() {
    sessionPassword = null;
    document.getElementById("mainApp").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("pwdInput").value = "";
    document.getElementById("resultsWrap").innerHTML = "";
  }

  // ── API call helper (always sends password) ───────────────────
  function api(params) {
    const q = new URLSearchParams({ ...params, pwd: sessionPassword });
    return fetch(SCRIPT_URL + "?" + q).then(r => r.json());
  }

  // ── Stats ─────────────────────────────────────────────────────
  function refreshStats(records) {
    const total   = records.length;
    const present = records.filter(r => r.attended === "Yes").length;
    document.getElementById("sTotal").textContent   = total;
    document.getElementById("sPresent").textContent = present;
    document.getElementById("sPending").textContent = total - present;
    document.getElementById("statsBox").style.display = "grid";
  }

  async function loadStats() {
    try {
      const data = await api({ action: "getAll" });
      if (data.success) refreshStats(data.records || []);
    } catch(e) {}
  }

  function clearRes() { document.getElementById("resultsWrap").innerHTML = ""; }

  // ── Search ────────────────────────────────────────────────────
  async function doSearch() {
    const reg    = document.getElementById("regIn").value.trim().toUpperCase();
    const name   = document.getElementById("nameIn").value.trim();
    const mobile = document.getElementById("mobileIn").value.trim().replace(/\s+/g, "");
    if (!reg && !name && !mobile) {
      alert("Enter a registration number, name, or mobile number to search.");
      return;
    }

    const btn = document.getElementById("searchBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Searching…';

    try {
      const params = { action: "search" };
      if (reg)    params.reg    = reg;
      if (name)   params.name   = name;
      if (mobile) params.mobile = mobile;
      const data = await api(params);

      if (!data.success || !data.records?.length) showNotFound();
      else if (data.records.length === 1) showProfile(data.records[0]);
      else showList(data.records);
    } catch(e) {
      document.getElementById("resultsWrap").innerHTML =
        `<div class="card"><p style="color:#B94040;font-size:14px">Search failed. Check your internet.</p></div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "🔍 Search";
    }
  }

  // ── Show all ──────────────────────────────────────────────────
  async function loadAll() {
    const btn = document.getElementById("allBtn");
    btn.textContent = "Loading…"; btn.disabled = true;
    try {
      const data = await api({ action: "getAll" });
      if (data.success && data.records) {
        refreshStats(data.records);
        showList(data.records, true);
      }
    } catch(e) { alert("Failed to load. Try again."); }
    btn.textContent = "📋 Show All Registrations"; btn.disabled = false;
  }

  // ── Not found ─────────────────────────────────────────────────
  function showNotFound() {
    document.getElementById("resultsWrap").innerHTML = `
      <div class="card">
        <div class="not-found">
          <div class="ico">🔍</div>
          <h3>No Match Found</h3>
          <p>No registration matches your search.<br/>Double-check the name or registration number.</p>
        </div>
      </div>`;
  }

  // ── List view ─────────────────────────────────────────────────
  function showList(records, isAll = false) {
    const present = records.filter(r => r.attended === "Yes").length;
    document.getElementById("resultsWrap").innerHTML = `
      <p style="font-size:13px;color:#9A8878;margin:4px 0 10px;font-family:'Inter',sans-serif">
        ${records.length} result${records.length !== 1 ? "s" : ""} found
        ${isAll ? " · " + present + " attended" : ""}
      </p>
      ${records.map(r => `
        <div class="mini" onclick='showProfile(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
          ${r.photo
            ? `<img src="data:image/jpeg;base64,${r.photo}" class="mini-img" alt="${r.name}"/>`
            : `<div class="mini-av">👤</div>`}
          <div style="flex:1;min-width:0">
            <p style="margin:0 0 2px;font-weight:700;font-size:14px;color:#2E1F0F;
               font-family:'Playfair Display',serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</p>
            <p style="margin:0 0 2px;font-size:12px;color:#C87941;font-weight:600">${r.company || "—"}</p>
            <p style="margin:0;font-size:11px;color:#9A8878">${r.regNumber} · ${r.timestamp}</p>
          </div>
          <span style="font-size:11px;font-weight:700;flex-shrink:0;
            color:${r.attended === "Yes" ? "#3A7D5A" : "#C8A060"}">
            ${r.attended === "Yes" ? "✅ Present" : "⏳ Pending"}
          </span>
        </div>`).join("")}`;
  }

  // ── Full profile view ─────────────────────────────────────────
  function showProfile(r) {
    const present = r.attended === "Yes";
    document.getElementById("resultsWrap").innerHTML = `
      <div class="card">
        ${r.photo
          ? `<img src="data:image/jpeg;base64,${r.photo}" class="profile-photo" alt="${r.name}"/>`
          : `<div class="no-photo">👤</div>`}
        <div class="reg-tag">${r.regNumber}</div><br/><br/>
        <span class="badge ${present ? "badge-yes" : "badge-no"}">
          ${present ? "✅ Attended" : "⏳ Not yet attended"}
        </span>
        <p class="pname">${r.name}</p>
        <p class="pcompany">${r.company || "—"}</p>
        <div class="drow"><span class="dico">📧</span>
          <div><span class="dlbl">Email</span>${r.email}</div></div>
        <div class="drow"><span class="dico">📱</span>
          <div><span class="dlbl">Mobile</span>${r.mobile}</div></div>
        <div class="drow"><span class="dico">📅</span>
          <div><span class="dlbl">Registered on</span>${r.date || "—"}</div></div>
        <div class="drow"><span class="dico">🕐</span>
          <div><span class="dlbl">Registered at</span>${r.time || "—"}</div></div>
        ${r.source ? `<div class="drow"><span class="dico">📣</span>
          <div><span class="dlbl">Heard via</span>${r.source}</div></div>` : ""}
        ${r.feedback ? `<div class="drow"><span class="dico">💬</span>
          <div><span class="dlbl">Comments</span>${r.feedback}</div></div>` : ""}
        ${r.attendedAt ? `<div class="drow"><span class="dico">🕐</span>
          <div><span class="dlbl">Marked present at</span>${r.attendedAt}</div></div>` : ""}

        ${!present
          ? `<button class="btn-green" id="markBtn" onclick="markAttended('${r.regNumber}', false)">
               ✅ Mark as Attended
             </button>`
          : `<button class="btn-undo" onclick="markAttended('${r.regNumber}', true)">
               ↩ Undo Attendance Mark
             </button>`}

        <button class="btn-s" style="width:100%;margin-top:10px"
                onclick="clearRes();loadStats()">← Back to Search</button>
      </div>`;
  }

  // ── Mark / unmark attended ────────────────────────────────────
  async function markAttended(regNumber, undo) {
    const btn = document.getElementById("markBtn") || document.querySelector(".btn-undo");
    if (btn) { btn.disabled = true; btn.textContent = "Updating…"; }
    try {
      const data = await api({
        action: "markAttended",
        reg: regNumber,
        undo: undo ? "true" : "false",
        time: new Date().toLocaleString("en-IN", {
          day:"2-digit", month:"short", year:"numeric",
          hour:"2-digit", minute:"2-digit", hour12: true
        })
      });
      if (data.success) { showProfile(data.record); loadStats(); }
      else alert("Update failed: " + (data.error || "unknown error"));
    } catch(e) { alert("Update failed. Check your internet connection."); }
  }
</script>
</body>
</html>
