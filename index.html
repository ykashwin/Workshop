<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workshop — Home</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F5F0EB;font-family:'Inter',sans-serif;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:20px;padding:36px 28px;max-width:420px;width:100%;
        text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.1);border:1px solid #EDE3D8}
  h1{font-family:'Playfair Display',serif;font-size:26px;color:#2E1F0F;margin-bottom:8px}
  p{color:#7A6855;font-size:14px;margin-bottom:28px;line-height:1.6}
  .btn{display:block;width:100%;padding:15px;border-radius:12px;font-family:'Inter',sans-serif;
       font-weight:700;font-size:15px;text-decoration:none;margin-bottom:12px;transition:opacity 0.2s}
  .btn:hover{opacity:0.88}
  .btn-p{background:linear-gradient(135deg,#C87941,#A85E28);color:#fff}
  .btn-s{background:#F0E4D4;color:#5A4030}
  .divider{color:#C8B8A2;font-size:12px;font-weight:600;margin:4px 0 16px;letter-spacing:0.5px}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:14px">📋</div>
  <h1>Workshop Portal</h1>
  <p>Choose what you'd like to do below</p>
  <a class="btn btn-p" href="registration-form.html">✅ Register for the Workshop</a>
  <div class="divider">— for organizers only —</div>
  <a class="btn btn-s" href="lookup.html">🔍 Attendance Lookup</a>
</div>
</body>
</html>
